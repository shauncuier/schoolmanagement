version: 2
# Version-update PRs are paused (open-pull-requests-limit: 0) to keep the repo
# clean. Security updates still come through. To resume routine updates, raise
# the limits (e.g. 5) — grouped minor/patch config is kept below ready to use.
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      composer-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    groups:
      github-actions:
        patterns: ["*"]
